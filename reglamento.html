<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reglamento Oficial - Reto Nürburgring 100 Días</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        :root { --neon-green: #39ff14; --carbon-black: #0b0c10; --panel-bg: #16171e; }
        body { background-color: var(--carbon-black); font-family: sans-serif; background-position: center top; background-repeat: no-repeat; background-size: 100% auto; }
        .panel-carbon { background-color: var(--panel-bg); border: 1px solid #222530; }
        .video-container-16-9 { position: relative; width: 100%; padding-top: 56.25%; background-color: #090a0d; border-radius: 8px; overflow: hidden; border: 1px solid #1f222e; }
        .video-container-16-9 iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
    </style>
</head>
<body class="text-gray-200 min-h-screen pb-12">
    <div class="container mx-auto px-4 max-w-7xl">
        <header class="mb-6 flex flex-col gap-4">
            
            <!-- EL LINK AHORA ESTÁ EN EL CONTENEDOR DEL BANNER/IMAGEN SUPERIOR -->
            <a href="index.html" id="banner-image-link" class="block h-[70px] md:h-[120px] lg:h-[140px] w-full hover:opacity-90 transition-opacity bg-center bg-cover rounded-xl"></a>

            <!-- TEXTOS DE LA CABECERA (Fuera del link, con su fondo difuminado original) -->
            <div class="w-full bg-gradient-to-r from-transparent via-black/75 to-transparent p-6 rounded-xl border border-gray-800/40 backdrop-blur-md flex flex-col items-center justify-center text-center gap-5">
                <div>
                    <h1 id="web-title" class="text-2xl md:text-4xl font-black tracking-wider text-white uppercase">Nürburgring Nordschleife</h1>
                    <p id="web-description" class="text-xs md:text-sm text-gray-300 font-bold uppercase tracking-widest mt-1">Reglamento y Normativa</p>
                </div>
            </div>

            <!-- NAVEGACIÓN EXTRAÍDA FUERA DEL VÍNCULO DEL BANNER -->
            <div class="flex flex-wrap items-center justify-center bg-black/40 p-2 rounded-lg border border-white/5 backdrop-blur-sm mt-1">
                <select onchange="window.location.href=this.value;" class="bg-gray-900 border border-gray-700 text-white text-xs font-bold rounded px-3 py-1.5 focus:outline-none focus:border-[var(--neon-green)] uppercase tracking-wider cursor-pointer">
                    <option value="index.html">📊 PANEL TELEMETRÍA</option>
                    <option value="reglamento.html" selected>📋 DESCRIPCIÓN DEL RETO</option>
                    <option value="extras.html">🎲 EXTRAS Y CONTENIDO</option>
                </select>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 items-start">
            <div class="panel-carbon rounded-xl p-6 md:col-span-2 space-y-6 text-center shadow-lg">
                <h2 class="text-xl font-black text-white uppercase border-b border-gray-800 pb-2">📋 REGLAMENTO Y NORMATIVA DEL RETO</h2>
                <div id="rules-intro-container" class="text-sm text-gray-300 bg-black/40 p-4 rounded border border-gray-800/80 max-w-2xl mx-auto leading-relaxed text-center">Cargando reglamento...</div>
                
                <!-- Contenedor centralizado para la lista tabular flex -->
                <div id="rules-list-container" class="space-y-4 pt-2 text-sm text-gray-300 max-w-xl mx-auto"></div>
            </div>
            <div class="space-y-6" id="presentation-videos-container"></div>
        </div>
    </div>

    <script>
        async function init() {
            try {
                const SHEET_ID = '1muYcQDtxqwcDO3pyxzgilha8TmqH2JL7y-cCO-DWiL8';
                const URL_CONFIG = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent('configuracion_web')}`;
                const URL_SECCIONES = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent('secciones_web')}`;

                const [resConfig, resSecciones] = await Promise.all([fetch(URL_CONFIG), fetch(URL_SECCIONES)]);
                
                // Cargar configuraciones estéticas básicas (Fondo/Título)
                const configText = await resConfig.text();
                const configRows = Papa.parse(configText, { header: false }).data;
                configRows.forEach(row => {
                    if(row[0] === 'BANNER_WEB') {
                        const bannerContainer = document.getElementById('banner-image-link');
                        if (bannerContainer) {
                            bannerContainer.style.backgroundImage = `url('${row[1]}')`;
                        }
                    }
                    if(row[0] === 'TITULO_WEB') document.getElementById('web-title').innerText = row[1];
                });

                // Cargar exclusivamente las normas y vídeos de presentación
                const secText = await resSecciones.text();
                const parsedSecciones = Papa.parse(secText, { header: false }).data;

                const introContainer = document.getElementById('rules-intro-container');
                const listContainer = document.getElementById('rules-list-container');
                const presentationContainer = document.getElementById('presentation-videos-container');

                parsedSecciones.forEach(row => {
                    const tipo = row[0] ? row[0].toString().toUpperCase().trim() : '';
                    const contenido = row[1] ? row[1].toString().trim() : '';
                    if (!tipo || !contenido) return;

                    if (tipo === 'TEXTO_NORMA') {
                        if (contenido.startsWith('-')) {
                            const item = document.createElement('div');
                            // Flex con items-start asegura que el punto quede fijo a la izquierda y el bloque de texto centrado
                            item.className = 'flex items-start gap-3 text-left w-full max-w-lg mx-auto leading-relaxed tracking-wide';
                            item.innerHTML = `
                                <span class="text-[var(--neon-green)] flex-shrink-0 select-none font-bold text-base">•</span>
                                <span class="block text-gray-300">${contenido.substring(1).trim()}</span>
                            `;
                            listContainer.appendChild(item);
                        } else {
                            introContainer.innerText = contenido;
                        }
                    } else if (tipo === 'PRESENTACION') {
                        const card = document.createElement('div');
                        card.className = 'panel-carbon rounded-xl p-5 text-left';
                        card.innerHTML = `
                            <span class="text-[10px] font-bold text-green-400 bg-green-950/40 px-2 py-0.5 border border-green-900/40 rounded uppercase tracking-widest block mb-2 w-max">🎬 VIDEO OFICIAL</span>
                            <div class="video-container-16-9 shadow-lg"><iframe src="https://www.youtube.com/embed/${contenido}" allowfullscreen></iframe></div>
                        `;
                        presentationContainer.appendChild(card);
                    }
                });
            } catch (e) { console.error(e); }
        }
        init();
    </script>
</body>
</html>
