<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reto Nürburgring 100 Días</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-main: #e0e0e0;
            --text-muted: #a0a0a0;
            --accent: #e50914; /* Rojo competición */
            --accent-hover: #b8070f;
            --border-color: #2a2a2a;
            --valid-color: #2e7d32;
            --invalid-color: #c62828;
            --dnf-color: #ef6c00;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        /* Cabecera limpia */
        header {
            text-align: center;
            padding: 40px 20px;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 2.5rem;
            margin: 0 0 15px 0;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .car-image {
            max-width: 100%;
            height: auto;
            max-height: 350px;
            border-radius: 8px;
            margin-bottom: 20px;
            object-fit: cover;
            border: 1px solid var(--border-color);
        }

        header p {
            color: var(--text-muted);
            font-size: 1.1rem;
            max-width: 600px;
            margin: 0 auto;
        }

        /* Grid de los días */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        /* Tarjeta de cada vuelta */
        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: transform 0.2s ease;
        }

        .card:hover {
            transform: translateY(-2px);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
            margin-bottom: 15px;
        }

        .day-badge {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text-main);
        }

        .pub-date {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .time-display {
            font-size: 2rem;
            font-weight: 800;
            font-family: monospace;
            text-align: center;
            margin: 10px 0;
            letter-spacing: -1px;
        }

        /* Estados dinámicos */
        .status-badge {
            display: inline-block;
            align-self: center;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 15px;
        }
